# Qmd Workflow Bugfix With Tests And Changelog

## Action

Follow the bugfix-with-tests-and-changelog workflow:
1. Identify and fix the bug in implementation files (e.g., src/store.ts, src/mcp/server.ts, src/cli/qmd.ts).
2. Update or add relevant test files (e.g., test/mcp.test.ts, test/store.test.ts, test/path-fidelity.test.ts).
3. Document the change in CHANGELOG.md.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/store.ts, src/mcp/server.ts, src/cli/qmd.ts

